<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCorp</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=IBM+Plex+Mono:wght@300;500&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      color: #e0e0e8;
      font-family: 'IBM Plex Mono', monospace;
      overflow: hidden;
    }

    /* Scanline overlay — subtle CRT feel */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.08) 2px,
        rgba(0, 0, 0, 0.08) 4px
      );
      z-index: 10;
    }

    /* Ambient glow behind logo */
    .glow {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0, 255, 136, 0.07) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      animation: pulse 6s ease-in-out infinite alternate;
    }

    @keyframes pulse {
      0%   { opacity: 0.5; transform: translate(-50%, -50%) scale(0.9); }
      100% { opacity: 1;   transform: translate(-50%, -50%) scale(1.1); }
    }

    .container {
      text-align: center;
      z-index: 1;
      position: relative;
    }

    /* === LOGO === */
    .logo {
      display: inline-block;
      margin-bottom: 32px;
    }

    .logo svg {
      width: 280px;
      height: auto;
    }

    /* Terminal-cursor blink on the bracket */
    .cursor {
      animation: blink 1s step-end infinite;
    }
    @keyframes blink {
      50% { opacity: 0; }
    }

    .wordmark {
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      font-size: 2.4rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #e0e0e8;
      margin-bottom: 12px;
    }

    .tagline {
      font-size: 0.85rem;
      font-weight: 300;
      color: rgba(0, 255, 136, 0.6);
      letter-spacing: 0.3em;
      text-transform: uppercase;
    }

    /* Pixel-art grid decoration */
    .grid-border {
      display: inline-block;
      padding: 40px 56px;
      border: 1px solid rgba(0, 255, 136, 0.15);
      position: relative;
    }
    .grid-border::before,
    .grid-border::after {
      content: '';
      position: absolute;
      width: 8px;
      height: 8px;
      border: 1px solid rgba(0, 255, 136, 0.4);
    }
    .grid-border::before { top: -4px; left: -4px; }
    .grid-border::after  { bottom: -4px; right: -4px; }

    /* Corner accents — opposite pair */
    .corner-tr, .corner-bl {
      position: absolute;
      width: 8px;
      height: 8px;
      border: 1px solid rgba(0, 255, 136, 0.4);
    }
    .corner-tr { top: -4px; right: -4px; }
    .corner-bl { bottom: -4px; left: -4px; }
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="container">
    <div class="grid-border">
      <div class="corner-tr"></div>
      <div class="corner-bl"></div>

      <!-- Logo: stylized S inside angle brackets, retro terminal style -->
      <div class="logo">
        <svg viewBox="0 0 280 120" xmlns="http://www.w3.org/2000/svg">
          <!-- Left bracket -->
          <text x="20" y="90" font-family="'Space Mono', monospace" font-weight="700"
                font-size="80" fill="none" stroke="rgba(0,255,136,0.8)" stroke-width="1.5"
                >&lt;</text>

          <!-- S glyph — the icon -->
          <text x="98" y="92" font-family="'Space Mono', monospace" font-weight="700"
                font-size="86" fill="rgba(0,255,136,0.9)"
                >S</text>

          <!-- Right bracket + blinking cursor -->
          <text x="178" y="90" font-family="'Space Mono', monospace" font-weight="700"
                font-size="80" fill="none" stroke="rgba(0,255,136,0.8)" stroke-width="1.5"
                >&gt;</text>
          <rect class="cursor" x="248" y="42" width="12" height="52" rx="1"
                fill="rgba(0,255,136,0.7)" />
        </svg>
      </div>

      <div class="wordmark">Sendracorp</div>
    </div>
  </div>
</body>
</html>
